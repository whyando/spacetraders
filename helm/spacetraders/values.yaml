replicaCount: 1

image:
  repository: registry.whyando.com/whyando/spacetraders
  pullPolicy: IfNotPresent
  # Defaults to the chart's appVersion (kept in lockstep with Cargo.toml on each
  # release), so a version bump + helm upgrade tracks the image automatically.
  # Override only to pin a specific tag.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Extra environment variables passed straight to the container (list of name/value).
# RUST_LOG and RUST_BACKTRACE are always set by the template. Per-agent values files
# (e.g. agents/WHYANDO.yaml in the deployment repo) supply the full set, including the
# required AGENT_CALLSIGN, POSTGRES_URI, POSTGRES_SCHEMA, and SPACETRADERS_ACCOUNT_TOKEN.
env: []
# Example:
# env:
#   - name: AGENT_CALLSIGN
#     value: WHYANDO
#   - name: POSTGRES_URI
#     value: postgres://postgres:pass@postgresql.postgres.svc.cluster.local:5432/spacetraders
#   - name: POSTGRES_SCHEMA
#     value: whyando_{RESET_DATE}
#   - name: SPACETRADERS_ACCOUNT_TOKEN
#     value: "eyJ..."

# The embedded read-only web dashboard (current agent, credits/net-worth history, fleet).
# The container listens on service.port (also passed through as WEB_PORT).
service:
  port: 8080

# Expose the dashboard at a hostname via ingress-nginx + cert-manager TLS.
# Disabled by default; enable per-agent (e.g. the one that owns the apex domain).
ingress:
  enabled: false
  className: nginx
  clusterIssuer: letsencrypt-prod
  host: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

# The bot is light at idle but the vrp-core logistics solver bursts across cores
# when replanning, so we leave generous CPU headroom while keeping memory modest.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "2"
    memory: 1Gi

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
